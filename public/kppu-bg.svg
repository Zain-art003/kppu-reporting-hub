<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="50%" style="stop-color:#283593"/>
      <stop offset="100%" style="stop-color:#1a237e"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,215,0,0.1)" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <!-- Grid Pattern -->
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <!-- Decorative Circle -->
  <circle cx="960" cy="540" r="400" fill="none" stroke="rgba(255,215,0,0.15)" stroke-width="2"/>
  <circle cx="960" cy="540" r="500" fill="none" stroke="rgba(255,215,0,0.1)" stroke-width="1"/>
  <circle cx="960" cy="540" r="600" fill="none" stroke="rgba(255,215,0,0.05)" stroke-width="1"/>
  <!-- KPPU Logo Placeholder -->
  <circle cx="960" cy="400" r="80" fill="#FFD700"/>
  <text x="960" y="420" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1a237e" text-anchor="middle">KPPU</text>
</svg>